<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Event Spinner</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
}

.page {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
.active { display: flex; }

input {
    font-size: 50px;
    padding: 20px;
    width: 250px;
    text-align: center;
    border-radius: 10px;
    border: none;
}

button {
    margin: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.start-btn {
    background: #00e676;
    color: black;
    font-size: 26px;
    padding: 15px 30px;
}

.reset-btn {
    background: #ff1744;
    color: white;
    font-size: 20px;
    padding: 10px 25px;
}

.pointer {
    width: 0;
    height: 0;
    border-left: 25px solid transparent;
    border-right: 25px solid transparent;
    border-top: 50px solid yellow;
    margin: 0 auto;
    transform: translateY(-20px);
    filter: drop-shadow(0 0 8px yellow);
}

.wheel-box { position: relative; }

.center-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: #111;
    border: 3px solid white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.result {
    font-size: 120px;
    margin-top: 10px;
}

.timer {
    font-size: 120px;
    font-weight: bold;
    color: #ffea00;
}

.round-btn {
    background: #00e676;
    color: black;
    font-size: 22px;
    padding: 12px 25px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="setup" class="page active">
    <h1>Enter Participants</h1>
    <input id="count" type="number" min="2">
    <button class="start-btn" onclick="startApp()">START</button>
    <button class="reset-btn" onclick="location.reload()">RESET</button>
</div>

<!-- PAGE 2 -->
<div id="spinner" class="page">
    <div class="pointer"></div>

    <div class="wheel-box">
        <canvas id="wheel" width="400" height="400"></canvas>
        <div class="center-btn" onclick="spin()">SPIN</div>
    </div>

    <div id="result" class="result">---</div>

    <button class="round-btn" onclick="goTimer()">START ROUND</button>
</div>

<!-- PAGE 3 -->
<div id="timerPage" class="page">
    <div id="timer" class="timer">00:00</div>
</div>

<!-- 🔥 YOUR LOCAL AUDIO -->
<audio id="alarm">
    <source src="beep.mpeg" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let numbers=[], colors=[];
let rotation=0, spinning=false;
let selectedIndex=null;
let currentPage="setup";

const palette=["#ff3d00","#00e676","#2979ff","#ffea00","#d500f9","#00bcd4"];

/* 🔥 AUDIO UNLOCK */
let audioUnlocked = false;
function unlockAudio() {
    if (!audioUnlocked) {
        const a = document.getElementById("alarm");
        a.play().then(() => {
            a.pause();
            a.currentTime = 0;
            audioUnlocked = true;
        }).catch(()=>{});
    }
}

/* page switch */
function show(page){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
    currentPage = page;
}

/* setup */
function startApp(){
    unlockAudio();

    const n=parseInt(count.value);
    if(!n || n<2) return alert("Enter valid");

    numbers=Array.from({length:n},(_,i)=>i+1);
    colors=numbers.map((_,i)=>palette[i%palette.length]);

    draw();
    show("spinner");
}

/* draw */
function draw(){
    const r=200;
    const slice=(2*Math.PI)/numbers.length;

    ctx.clearRect(0,0,400,400);

    numbers.forEach((num,i)=>{
        let start=i*slice, end=start+slice;

        ctx.beginPath();
        ctx.moveTo(r,r);
        ctx.arc(r,r,r,start,end);
        ctx.fillStyle=colors[i];
        ctx.fill();

        ctx.save();
        ctx.translate(r,r);
        ctx.rotate(start+slice/2);
        ctx.fillStyle="#000";
        ctx.textAlign="right";
        ctx.font="bold 20px Arial";
        ctx.fillText(num,r-10,5);
        ctx.restore();
    });
}

/* spin */
function spin(){
    unlockAudio();

    if(spinning || numbers.length===0) return;

    spinning=true;

    let spinAmt=360*5+Math.random()*360;
    let start=null;

    function anim(ts){
        if(!start) start=ts;
        let p=ts-start;

        let ease=1-Math.pow(1-p/3500,4);
        let angle=rotation+spinAmt*ease;

        ctx.save();
        ctx.clearRect(0,0,400,400);
        ctx.translate(200,200);
        ctx.rotate(angle*Math.PI/180);
        ctx.translate(-200,-200);
        draw();
        ctx.restore();

        if(p<3500) requestAnimationFrame(anim);
        else{
            rotation+=spinAmt;
            spinning=false;
            calculateResult();
        }
    }
    requestAnimationFrame(anim);
}

/* result */
function calculateResult(){
    let sliceDeg=360/numbers.length;
    let pointer=(270-(rotation%360)+360)%360;
    let index=Math.floor(pointer/sliceDeg)%numbers.length;

    selectedIndex=index;

    result.innerText=numbers[index];
    result.style.color=colors[index];

    numbers.splice(index,1);
    colors.splice(index,1);

    draw();
}

/* timer */
function goTimer(){
    if(selectedIndex===null) return alert("Spin first");

    show("timerPage");
    startTimer();
}

function startTimer(){
    let start=Date.now();
    const alarm=document.getElementById("alarm");

    const interval=setInterval(()=>{
        let t=Math.floor((Date.now()-start)/1000);

        timer.innerText=
            `${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;

        if(t===58 || t=== 148 || t===178){
            alarm.pause();
            alarm.currentTime=0;
            alarm.play().catch(()=>{});
        }

        if(t>=183){
            clearInterval(interval);
            selectedIndex=null;
            show("spinner");
        }
    },200);
}

/* keyboard */
document.addEventListener("keydown", (e) => {

    if (e.code === "Enter" && currentPage === "setup") {
        startApp();
        return;
    }

    if (currentPage === "spinner") {

        if (e.code === "Space") {
            e.preventDefault();
            if (!spinning) spin();
        }

        if (e.code === "Enter" && selectedIndex !== null) {
            goTimer();
        }
    }

});
</script>

</body>
</html>
